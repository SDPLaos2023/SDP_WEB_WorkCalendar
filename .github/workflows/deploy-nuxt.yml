name: Deploy SDP_WEB_WorkCalendar (Nuxt) to IIS

on:
  push:
    branches:
      - Deploy

jobs:
  call-deploy:
    uses: SDPLaos2023/github-workflows/.github/workflows/deploy-iis-nuxt.yml@main
    with:
      app_pool: 'WorkCalendar'
      deploy_path: 'C:\inetpub\wwwroot\Work_Calendar\.output'
      backup_prefix: 'WorkCalendar'
      runner_label: 'TDP-IMMIGRATION'
      package_manager: 'npm'
      node_version: '22'
      build_script: 'build'
      build_output: '.output'
      backup_keep: 5

  # เพิ่ม Job ใหม่ทำงานต่อจาก Job แรกเพื่อสั่ง PM2
  post-deploy:
    needs: call-deploy # สั่งให้ทำงานหลังจาก call-deploy เสร็จเท่านั้น
    runs-on: ['self-hosted', 'TDP-IMMIGRATION']
    steps:
      - name: Restart PM2 and Save
        shell: cmd
        run: |
          cd C:\inetpub\wwwroot\Work_Calendar
          pm2 startOrRestart ecosystem.config.cjs --env production
          pm2 save
