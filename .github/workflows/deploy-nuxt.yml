name: Deploy SDP_WEB_WorkCalendar (Nuxt) to IIS

on:
  push:
    branches:
      - Deploy

jobs:
  call-deploy:
    uses: SDPLaos2023/github-workflows/.github/workflows/deploy-iis-nuxt.yml@main
    with:
      app_pool: 'WorkCalendar'
      deploy_path: 'C:\inetpub\wwwroot\Work_Calendar\.output'
      backup_prefix: 'WorkCalendar'
      runner_label: 'TDP-IMMIGRATION'
      package_manager: 'npm'
      node_version: '22'
      build_script: 'build'
      build_output: '.output'
      backup_keep: 5
      post_deploy_script: |
        cd C:\inetpub\wwwroot\Work_Calendar
        pm2 restart WorkCalendar
        pm2 save
