name: Deploy SDP_WEB_WorkCalendar (Nuxt) with PM2

on:
  push:
    branches:
      - Deploy

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Install dependencies
        run: npm install
      - name: Run tests
        run: npm run test
  deploy:
    needs: test
    runs-on: ["self-hosted", "TDP-IMMIGRATION"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Install dependencies
        run: npm install
      - name: prism generate
        run: npx prisma generate
      - name: build Nuxt app
        run: npm run build
      - name: Copy build to IIS folder
        shell: cmd
        run: |
          if exist C:\inetpub\wwwroot\Work_Calendar\prd rmdir /s /q C:\inetpub\wwwroot\Work_Calendar\prd
          xcopy .output C:\inetpub\wwwroot\Work_Calendar\prd /E /I /Y
  pm2_restart:
    needs: deploy
    runs-on: ["self-hosted", "TDP-IMMIGRATION"]
    steps:
      - name: Start/Restart PM2
        run: |
          cd C:\inetpub\wwwroot\Work_Calendar
          pm2 startOrRestart ecosystem.config.cjs --env production
          pm2 save
